version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: injeniorw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: injeniorw
      POSTGRES_PASSWORD: injeniorw_dev_password
      POSTGRES_DB: injeniorw_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U injeniorw -d injeniorw_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (optional DB GUI) ─────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: injeniorw_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@injeniorw.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
